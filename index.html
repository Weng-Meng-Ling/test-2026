<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年第一次內勤人員檢測</title>
<style>
/* ═══════════════════════════════════════════
   TOKENS & RESET
═══════════════════════════════════════════ */
:root{
  --cream:#f7f4ef;
  --paper:#fdfcf9;
  --stone:#e8e2d9;
  --stone2:#d4ccc0;
  --ink:#2b2318;
  --ink2:#5a5040;
  --ink3:#8c7e6e;
  --sage:#4a6741;
  --sage-bg:#edf3eb;
  --sage-bd:#b8d4b2;
  --rust:#8b3a2a;
  --rust-bg:#faf0ee;
  --rust-bd:#e8b8b0;
  --amber:#7a5c1e;
  --amber-bg:#faf4e6;
  --amber-bd:#d4b878;
  --plum:#5a3070;
  --plum-bg:#f5f0fa;
  --plum-bd:#c8a8e0;
  --navy:#2a3d5c;
  --navy-bg:#edf1f8;
  --navy-bd:#a8bedc;
  --gold:#b8960a;
  --r:10px;
  --sh:0 2px 10px rgba(43,35,24,.07);
  --sh2:0 4px 20px rgba(43,35,24,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Helvetica Neue',Arial,'Microsoft JhengHei','PingFang TC',sans-serif;
     background:var(--cream);color:var(--ink);font-size: 19px;line-height:1.7}

/* ═══ HEADER ═══ */
.hdr{
  background:linear-gradient(135deg,#2b2318 0%,#4a3820 55%,#6b522e 100%);
  color:#fff;text-align:center;padding:38px 20px 32px;position:relative;overflow:hidden
}
.hdr::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 30px,rgba(255,255,255,.018) 30px,rgba(255,255,255,.018) 60px)
}
.hdr h1{font-size:clamp(1.3rem,4vw,1.85rem);font-weight:700;letter-spacing:.04em;
         position:relative;text-shadow:0 1px 4px rgba(0,0,0,.3)}
.hdr-rule{width:56px;height:2px;background:rgba(200,170,100,.7);margin:14px auto 0;border-radius:1px;position:relative}
.hdr-sub{margin-top:8px;font-size: 0.95rem;color:rgba(255,255,255,.55);letter-spacing:.1em;position:relative}

/* ═══ LAYOUT ═══ */
.wrap{max-width:840px;margin:0 auto;padding:32px 18px 70px}

/* ═══ CARD ═══ */
.card{background:var(--paper);border:1px solid var(--stone);border-radius:var(--r);
      padding:30px 28px;box-shadow:var(--sh);margin-bottom:22px}

/* ═══ LANDING ═══ */
.landing-intro{font-size: 1.05rem;color:var(--ink2);margin-bottom:26px;line-height:1.85}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px}
@media(max-width:520px){.form-grid{grid-template-columns:1fr}}
.fg label{display:block;font-size: 0.89rem;font-weight:700;color:var(--amber);
          letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.fg input{width:100%;padding:10px 13px;border:1.5px solid var(--stone);border-radius:8px;
          background:var(--cream);color:var(--ink);font-size: 1.08rem;outline:none;
          transition:border-color .18s,box-shadow .18s;font-family:inherit}
.fg input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(122,92,30,.12)}
.info-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:26px}
@media(max-width:520px){.info-strip{grid-template-columns:1fr}}
.info-box{background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:8px;
          padding:13px 14px;text-align:center}
.info-box b{display:block;font-size: 1.83rem;font-weight:800;color:var(--amber);line-height:1}
.info-box span{font-size: 0.9rem;color:var(--ink3);margin-top:3px;display:block}
.btn{width:100%;padding:13px;border:none;border-radius:8px;font-family:inherit;
     font-size: 1.1rem;font-weight:700;cursor:pointer;letter-spacing:.06em;transition:opacity .18s,transform .1s}
.btn:hover{opacity:.88}.btn:active{transform:scale(.99)}
.btn-start{background:linear-gradient(135deg,var(--amber),#c4900a);color:#fff;
           box-shadow:0 3px 12px rgba(122,92,30,.22)}

/* ═══ PROGRESS ═══ */
.quiz-topbar{display:flex;align-items:center;justify-content:space-between;
             flex-wrap:wrap;gap:12px;margin-bottom:22px}
.user-chip{font-size: 0.96rem;color:var(--ink3)}
.user-chip strong{color:var(--ink);font-weight:600}
.prog-wrap{flex:1;min-width:160px;max-width:300px}
.prog-lbl{font-size: 0.88rem;color:var(--ink3);margin-bottom:4px;text-align:right}
.prog-track{height:5px;background:var(--stone);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--amber),#e8a800);
           border-radius:3px;transition:width .3s;width:0%}

/* ═══ SECTION HEADER ═══ */
.sec-hdr{display:flex;align-items:center;gap:10px;margin:28px 0 14px}
.sec-hdr:first-child{margin-top:0}
.sec-badge{padding:4px 14px;border-radius:20px;font-size: 0.88rem;font-weight:700;
           letter-spacing:.06em;white-space:nowrap}
.badge-tf{background:var(--navy-bg);color:var(--navy);border:1px solid var(--navy-bd)}
.badge-sc{background:var(--sage-bg);color:var(--sage);border:1px solid var(--sage-bd)}
.badge-mc{background:var(--plum-bg);color:var(--plum);border:1px solid var(--plum-bd)}
.sec-line{flex:1;height:1px;background:var(--stone)}

/* ═══ QUESTION CARD ═══ */
.qcard{background:var(--paper);border:1.5px solid var(--stone);border-radius:var(--r);
       padding:20px 22px;margin-bottom:14px;box-shadow:var(--sh);transition:border-color .2s}
.qcard:hover{border-color:var(--stone2)}
.qcard.answered{border-left:3px solid var(--sage)}
.q-top{display:flex;gap:12px;margin-bottom:12px}
.q-num{flex-shrink:0;width:28px;height:28px;border-radius:50%;
       background:var(--amber-bg);border:1px solid var(--amber-bd);
       display:flex;align-items:center;justify-content:center;
       font-size: 0.85rem;font-weight:800;color:var(--amber)}
.q-text{font-size: 1.06rem;font-weight:500;line-height:1.7;flex:1}
.q-note{font-size: 0.86rem;color:var(--ink3);margin:0 0 10px 40px;
        padding:3px 8px;background:var(--stone);border-radius:4px;display:inline-block}

/* ═══ TF BUTTONS ═══ */
.tf-row{display:flex;gap:10px;margin-left:40px}
.tf-btn{flex:1;padding:9px 6px;border:1.5px solid var(--stone);border-radius:8px;
        background:var(--cream);cursor:pointer;font-family:inherit;font-size: 1.03rem;
        text-align:center;transition:all .15s;font-weight:500;color:var(--ink2)}
.tf-btn:hover{border-color:var(--stone2);background:var(--stone)}
.tf-o.sel{border-color:var(--sage);background:var(--sage-bg);color:var(--sage);font-weight:700}
.tf-x.sel{border-color:var(--rust);background:var(--rust-bg);color:var(--rust);font-weight:700}

/* ═══ CHOICE OPTIONS ═══ */
.opts{display:flex;flex-direction:column;gap:7px;margin-left:40px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;
     border:1.5px solid var(--stone);border-radius:8px;cursor:pointer;
     background:var(--cream);transition:all .15s;user-select:none;font-size: 1.03rem}
.opt:hover{border-color:var(--stone2);background:var(--stone)}
.opt.sel{border-color:var(--amber);background:var(--amber-bg)}
.opt-box{flex-shrink:0;width:18px;height:18px;border:2px solid var(--stone2);
         border-radius:4px;margin-top:2px;display:flex;align-items:center;
         justify-content:center;transition:all .15s}
.opt-circle{border-radius:50%}
.opt.sel .opt-box{background:var(--amber);border-color:var(--amber)}
.opt.sel .opt-box::after{content:'✓';color:#fff;font-size: 15px;font-weight:800;line-height:1}
.opt-circle.opt-circ-inner{border-radius:50%}
.opt.sel .opt-circle::after{content:'';display:block;width:8px;height:8px;
  border-radius:50%;background:#fff}
.opt-lbl{font-weight:700;color:var(--ink3);flex-shrink:0}

/* ═══ SUBMIT ═══ */
.submit-wrap{text-align:center;margin-top:30px}
.btn-submit{background:linear-gradient(135deg,#2b2318,#4a3820);color:#fff;
            padding:14px 52px;width:auto;display:inline-block;
            box-shadow:0 4px 16px rgba(43,35,24,.2)}

/* ═══ RESULT ═══ */
.result-hero{text-align:center;padding:28px 0 20px}
.score-ring{width:150px;height:150px;border-radius:50%;margin:0 auto 18px;
            display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pass{background:var(--sage-bg);border:4px solid var(--sage)}
.ring-fail{background:var(--rust-bg);border:4px solid var(--rust)}
.score-n{font-size: 2.93rem;font-weight:900;line-height:1}
.score-pass .score-n{color:var(--sage)}
.score-fail .score-n{color:var(--rust)}
.score-unit{font-size: 0.95rem;margin-top:3px}
.score-pass .score-unit{color:var(--sage)}
.score-fail .score-unit{color:var(--rust)}
.res-who{font-size: 1.03rem;color:var(--ink3);margin-bottom:6px}
.res-verdict{font-size: 1.38rem;font-weight:800}
.res-pass{color:var(--sage)}.res-fail{color:var(--rust)}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:22px 0}
@media(max-width:480px){.stat-grid{grid-template-columns:1fr}}
.stat-box{background:var(--amber-bg);border:1px solid var(--amber-bd);
          border-radius:8px;padding:14px;text-align:center}
.stat-n{font-size: 1.53rem;font-weight:800;color:var(--amber)}
.stat-l{font-size: 0.88rem;color:var(--ink3);margin-top:2px}

/* ─── RED NOTICE ─── */
.red-notice{
  background:#fff5f4;border:2px solid #c0392b;border-radius:8px;
  padding:16px 22px;text-align:center;margin-top:22px
}
.red-notice p{color:#c0392b;font-weight:800;font-size: 1.13rem;line-height:1.65}

/* ─── REVIEW ─── */
.review-wrap{margin-top:26px}
.review-title{font-size: 1.08rem;font-weight:700;color:var(--amber);
              padding-bottom:8px;border-bottom:1.5px solid var(--stone);margin-bottom:14px}
.rv{padding:11px 14px;border-radius:8px;margin-bottom:9px;font-size: 0.99rem}
.rv-ok{background:var(--sage-bg);border:1px solid var(--sage-bd)}
.rv-no{background:var(--rust-bg);border:1px solid var(--rust-bd)}
.rv-q{font-weight:600;margin-bottom:4px}
.rv-ok .rv-q::before{content:'✓ ';color:var(--sage)}
.rv-no .rv-q::before{content:'✗ ';color:var(--rust)}
.rv-ans{font-size: 0.93rem;color:var(--ink3);line-height:1.6}
.rv-mine{color:var(--rust)}
.rv-correct{color:var(--sage);font-weight:700}

/* hide utility */
.hidden{display:none!important}
</style>
</head>
<body>

<div class="hdr">
  <h1>2026年第一次內勤人員檢測</h1>
  <div class="hdr-rule"></div>
</div>

<!-- ══════════════ PAGE 1: LANDING ══════════════ -->
<div id="pg-land" class="wrap">
  <div class="card">
    <p class="landing-intro">
      歡迎參加本次職能檢測。請填寫部門名稱與英文名字後按下「開始測驗」。<br>
      系統將從題庫隨機抽出 <strong>50 題</strong>（是非 10 題、單選 30 題、複選 10 題），測驗完成後請勿關閉視窗，並通知人事確認結果。
    </p>
    <div class="form-grid">
      <div class="fg">
        <label>部門名稱</label>
        <input id="inp-dept" type="text" autocomplete="off">
      </div>
      <div class="fg">
        <label>英文名字</label>
        <input id="inp-name" type="text" autocomplete="off">
      </div>
    </div>
    <button class="btn btn-start" onclick="startQuiz()">開始測驗</button>
  </div>
</div>

<!-- ══════════════ PAGE 2: QUIZ ══════════════ -->
<div id="pg-quiz" class="wrap hidden">
  <div class="quiz-topbar">
    <div class="user-chip">部門：<strong id="dsp-dept"></strong> ／ 姓名：<strong id="dsp-name"></strong></div>
    <div class="prog-wrap">
      <div class="prog-lbl" id="prog-lbl">0 / 50 題已作答</div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    </div>
  </div>
  <div id="quiz-body"></div>
  <div class="submit-wrap">
    <button class="btn btn-submit" onclick="submitQuiz()">送出測驗</button>
  </div>
</div>

<!-- ══════════════ PAGE 3: RESULT ══════════════ -->
<div id="pg-result" class="wrap hidden">
  <div class="card">
    <div class="result-hero">
      <div id="score-ring" class="score-ring">
        <div class="score-n" id="score-n">—</div>
        <div class="score-unit">分</div>
      </div>
      <p class="res-who" id="res-who"></p>
      <p class="res-verdict" id="res-verdict"></p>
    </div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-n" id="st-tf">—</div><div class="stat-l">是非題得分</div></div>
      <div class="stat-box"><div class="stat-n" id="st-sc">—</div><div class="stat-l">單選題得分</div></div>
      <div class="stat-box"><div class="stat-n" id="st-mc">—</div><div class="stat-l">複選題得分</div></div>
    </div>

    <!-- RED NOTICE -->
    <div class="red-notice">
      <p>⚠️ 請勿關閉網頁，請通知人事確認測驗結果！</p>
    </div>

    <div class="review-wrap">
      <div class="review-title">作答明細</div>
      <div id="review-body"></div>
    </div>
  </div>
</div>

<script>
// ╔══════════════════════════════════════════╗
// ║            QUESTION BANKS                ║
// ╚══════════════════════════════════════════╝

// ans: true = O (正確), false = X (錯誤)
const TF = [
  {q:'每週一為全體會議時間。', a:false},
  {q:'同仁若於非正常下班時間(如：請假提早下班)離開公司，無論使用人臉辨識、指紋機或打卡機，直接打卡即可。', a:false},
  {q:'在安全的室內等待救援時，如果門後有煙，應該要趕快把門、窗打開通風。', a:false},
  {q:'公司性騷擾申訴信箱為113@bingotimes.com.tw。', a:true},
  {q:'若發出傳閱後發現錯誤如已有人回覆時，仍可直接進行傳閱內容修改動作？', a:false},
  {q:'車輛違規肇事者，依公司規定予以處分，違規罰款部分由駕駛人自行負責；違規記點，公司會向《台中市交通事件裁決處》申請轉移至違規汽車駕駛人。', a:true},
  {q:'發生火災時，若發現受困環境中煙霧瀰漫，應採取高姿態快速奔跑，以爭取逃生時間。', a:false},
  {q:'員工旅遊基金的提撥方式，是財務課經核決主管核准後每月定額提撥。', a:true},
  {q:'同仁對於薪資計算結果或薪資單明細如有疑義，應直接向財務課出納人員尋求諮詢與更正。', a:false},
  {q:'於知悉有性騷擾之情形時，應採取立即有效之糾正及補救措施。', a:true},
  {q:'關於公司軟體與資料安全，同仁可視個人需求擅自安裝軟體，或將公司擁有的軟體及資料拷貝至外部使用。', a:false},
  {q:'非極機密文件統一由管理部人事掃描建立電子檔，掃描後紙本文件歸還相關單位負保管之責。', a:false},
  {q:'流程圖是一種圖形表示，用於顯示工作或程序的步驟與順序。', a:true},
  {q:'同仁因公需往返外地且【無公務車】可使用時，經部門主管呈報上級主管同意者，不限職位，均得以台灣高鐵【標準車廂】之憑證核實報銷，外勤單位駐點、交接、輪休不適用此條文。', a:true},
  {q:'無燈傳閱、*字號傳閱，需於收到30天內完成回覆。', a:true},
  {q:'同仁欲變更英文名字，需告知部門主管，由部門主管通知管理部主管及人事，並由人事送出電子權限申請單請MIS做相關更動。', a:true},
  {q:'雇主對勞工應施以從事工作與預防災變所必要之安全衛生教育及訓練，勞工對於安全衛生教育及訓練，有接受之義務。', a:true},
  {q:'公司員工若業務上有需要對洗牌機等機器設備或牌組進行攝錄影或拍照動作，不需要事先取得客戶同意及公司書面同意，即可拍照。', a:false},
  {q:'臨時請假須提前報備，事後回報不得用特休與榮譽假。', a:true},
  {q:'主管於下班後交辦工作事項，若非緊急事件，應在訊息中加註「無需立即回覆或處理」之相關文字。', a:true},
  {q:'依據「道路交通管理處罰條例」第33條規定：行駛途中，若有車輪、輪胎膠皮或車輛機件脫落、輪胎任一點胎紋深度不足等情事，可處駕駛人新臺幣3000元~6000元罰鍰；而車輛缺水、缺油等問題，可處新臺幣600～1200元罰鍰。', a:true},
  {q:'火是火場中最大的殺手。', a:false},
  {q:'由資材部規劃的年度盤點為公司重大活動，考量盤點人力上的調度與支援，於盤點期間實施管制休假。', a:true},
  {q:'若在辦公室發現初期小火，而周圍安全的情況下可先拿滅火器滅火。', a:true},
  {q:'當因公務需求出外勤時，不論是否為上班時間，皆需要於iNET系統作回報。', a:true},
  {q:'當日上班後如臨時請假，經部門主管核准後，下班時不用打下班卡。', a:false},
  {q:'若同仁提出加班，僅可選擇「補休」方式；且補休需於申請加班之次月底前休畢，如因故無法休畢且無提出申訴，則折合薪資加班費發給。', a:false},
  {q:'公司目前配合的薪資轉帳銀行有合作金庫、台新銀行、中國信託。', a:false},
  {q:'同仁離開原先辦公區域樓層，應於iNET系統進行「樓層移動」，以確保人事單位即時掌握同仁動向。', a:true},
  {q:'駕駛公務車應注意行車安全並嚴禁酒後駕車；此外，為維護車內環境，應隨時保持車內清潔並全面禁菸。', a:true},
];

// Single-choice: a = correct option index 0-based (A=0,B=1,C=2,D=3,E=4)
const SC = [
  {q:'依公司環境維護規範-回收標準，下列敘述何者錯誤？',
   o:['餐盒、飲料杯需落實「清空、清洗、壓扁」三個步驟後才可丟入回收桶','當月全體同仁違規次數總計超過5次，該樓層之回收垃圾桶將暫時「上鎖一天」','第一次查證屬實扣紅利點數3點','第三次以上仍未改善者，除再扣點外還會列入年度績效考績評核'], a:2},

let quizTF=[], quizSC=[], quizMC=[];
let answers={};
let userDept='', userName='';

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]]}
  return a;
}
const pick=(arr,n)=>shuffle(arr).slice(0,n);

// ║              START QUIZ                  ║
// ╚══════════════════════════════════════════╝
function startQuiz(){
  userDept=document.getElementById('inp-dept').value.trim();
  userName=document.getElementById('inp-name').value.trim();
  if(!userDept||!userName){alert('請填寫部門名稱與英文名字！');return;}

  quizTF=pick(TF,10);
  quizSC=pick(SC,30);
  quizMC=pick(MC,10);
  answers={};

  document.getElementById('dsp-dept').textContent=userDept;
  document.getElementById('dsp-name').textContent=userName;
  buildQuiz();

  document.getElementById('pg-land').classList.add('hidden');
  document.getElementById('pg-quiz').classList.remove('hidden');
  window.scrollTo(0,0);
}

// ║             BUILD QUIZ DOM               ║
// ╚══════════════════════════════════════════╝
const LABS=['A','B','C','D','E'];

function buildQuiz(){
  const body=document.getElementById('quiz-body');
  body.innerHTML='';
  let n=0;

  // ─ TF ─
  body.appendChild(sectionHdr('badge-tf','是非題　第 1 ~ 10 題'));
  quizTF.forEach((q,i)=>{
    n++;
    const id='tf'+i;
    const card=el('div','qcard');
    card.id='card-'+id;
    card.innerHTML=`
      <div class="q-top">
        <div class="q-num">${n}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="tf-row">
        <button class="tf-btn tf-o" id="${id}-O" onclick="pickTF('${id}',true)">正確（O）</button>
        <button class="tf-btn tf-x" id="${id}-X" onclick="pickTF('${id}',false)">錯誤（X）</button>
      </div>`;
    body.appendChild(card);
  });

  // ─ SC ─
  body.appendChild(sectionHdr('badge-sc','單選題　第 11 ~ 40 題'));
  quizSC.forEach((q,i)=>{
    n++;
    const id='sc'+i;
    const card=el('div','qcard');
    card.id='card-'+id;
    const optHtml=q.o.map((o,j)=>`
      <div class="opt" id="${id}-${j}" onclick="pickSC('${id}',${j},${q.o.length})">
        <div class="opt-box opt-circle"></div>
        <span class="opt-lbl">${LABS[j]}.</span>
        <span>${o}</span>
      </div>`).join('');
    card.innerHTML=`
      <div class="q-top">
        <div class="q-num">${n}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="q-note">請選擇一個正確答案</div>
      <div class="opts">${optHtml}</div>`;
    body.appendChild(card);
  });

  // ─ MC ─
  body.appendChild(sectionHdr('badge-mc','複選題　第 41 ~ 50 題'));
  quizMC.forEach((q,i)=>{
    n++;
    const id='mc'+i;
    const card=el('div','qcard');
    card.id='card-'+id;
    const optHtml=q.o.map((o,j)=>`
      <div class="opt" id="${id}-${j}" onclick="toggleMC('${id}',${j})">
        <div class="opt-box"></div>
        <span class="opt-lbl">${LABS[j]}.</span>
        <span>${o}</span>
      </div>`).join('');
    card.innerHTML=`
      <div class="q-top">
        <div class="q-num">${n}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="q-note">請選擇所有正確答案（可複選）</div>
      <div class="opts">${optHtml}</div>`;
    body.appendChild(card);
  });

  updateProg();
}

function sectionHdr(cls,text){
  const d=el('div','sec-hdr');
  d.innerHTML=`<div class="sec-badge ${cls}">${text}</div><div class="sec-line"></div>`;
  return d;
}
function el(tag,cls){const e=document.createElement(tag);e.className=cls;return e;}

// ╔══════════════════════════════════════════╗
// ║           INTERACTION HANDLERS           ║
// ╚══════════════════════════════════════════╝
function pickTF(id,val){
  answers[id]=val;
  const oBtn=document.getElementById(id+'-O');
  const xBtn=document.getElementById(id+'-X');
  oBtn.className='tf-btn tf-o'+(val===true?' sel':'');
  xBtn.className='tf-btn tf-x'+(val===false?' sel':'');
  markAnswered(id);
  updateProg();
}

function pickSC(id,idx,total){
  answers[id]=idx;
  for(let j=0;j<total;j++){
    const d=document.getElementById(id+'-'+j);
    if(d) d.className='opt'+(j===idx?' sel':'');
  }
  markAnswered(id);
  updateProg();
}

function toggleMC(id,idx){
  if(!answers[id]) answers[id]=[];
  const pos=answers[id].indexOf(idx);
  if(pos>=0) answers[id].splice(pos,1); else answers[id].push(idx);
  const d=document.getElementById(id+'-'+idx);
  if(d) d.className='opt'+(answers[id].includes(idx)?' sel':'');
  markAnswered(id);
  updateProg();
}

function markAnswered(id){
  const card=document.getElementById('card-'+id);
  if(!card) return;
  const done=(()=>{
    const v=answers[id];
    if(v===undefined||v===null) return false;
    if(Array.isArray(v)) return v.length>0;
    return true;
  })();
  card.classList.toggle('answered',done);
}

function updateProg(){
  let done=0;
  quizTF.forEach((_,i)=>{if(answers['tf'+i]!==undefined) done++;});
  quizSC.forEach((_,i)=>{if(answers['sc'+i]!==undefined) done++;});
  quizMC.forEach((_,i)=>{if(answers['mc'+i]&&answers['mc'+i].length>0) done++;});
  document.getElementById('prog-lbl').textContent=`${done} / 50 題已作答`;
  document.getElementById('prog-fill').style.width=`${done/50*100}%`;
}

// ╔══════════════════════════════════════════╗
// ║              SUBMIT & SCORE              ║
// ╚══════════════════════════════════════════╝
function submitQuiz(){
  // count unanswered
  let blank=0;
  quizTF.forEach((_,i)=>{if(answers['tf'+i]===undefined) blank++;});
  quizSC.forEach((_,i)=>{if(answers['sc'+i]===undefined) blank++;});
  quizMC.forEach((_,i)=>{if(!answers['mc'+i]||answers['mc'+i].length===0) blank++;});
  if(blank>0 && !confirm(`您還有 ${blank} 題尚未作答，確定要送出？`)) return;

  // score
  let tfOk=0,scOk=0,mcOk=0;
  const tfWrong=[],scWrong=[],mcWrong=[];

  quizTF.forEach((q,i)=>{
    const ans=answers['tf'+i];
    if(ans===q.a) tfOk++; else tfWrong.push(i);
  });
  quizSC.forEach((q,i)=>{
    if(answers['sc'+i]===q.a) scOk++; else scWrong.push(i);
  });
  quizMC.forEach((q,i)=>{
    const given=(answers['mc'+i]||[]).slice().sort((a,b)=>a-b).join(',');
    const correct=[...q.a].sort((a,b)=>a-b).join(',');
    if(given===correct) mcOk++; else mcWrong.push(i);
  });

  const total=tfOk+scOk+mcOk;
  const pct=Math.round(total/50*100);
  const pass=pct>=70;

  // populate result
  const ring=document.getElementById('score-ring');
  ring.className='score-ring '+(pass?'ring-pass':'ring-fail');
  const scoreEl=document.getElementById('score-n');
  scoreEl.className='score-n '+(pass?'score-pass':'score-fail');
  scoreEl.textContent=pct;
  document.getElementById('res-who').textContent=`${userDept}　${userName}`;
  const verd=document.getElementById('res-verdict');
  verd.textContent=pass?'🎉 恭喜通過測驗！':'⚠ 成績未達標準，請加強複習';
  verd.className='res-verdict '+(pass?'res-pass':'res-fail');
  document.getElementById('st-tf').textContent=`${tfOk} / 10`;
  document.getElementById('st-sc').textContent=`${scOk} / 30`;
  document.getElementById('st-mc').textContent=`${mcOk} / 10`;

  // build review
  const rb=document.getElementById('review-body');
  rb.innerHTML='';
  let globalN=0;

  quizTF.forEach((q,i)=>{
    globalN++;
    const ok=!tfWrong.includes(i);
    const userA=answers['tf'+i];
    const userTxt=userA===undefined?'未作答':(userA?'○ 正確（O）':'✕ 錯誤（X）');
    const corrTxt=q.a?'○ 正確（O）':'✕ 錯誤（X）';
    rb.appendChild(makeRV(globalN,q.q,ok,userTxt,ok?'':corrTxt));
  });
  quizSC.forEach((q,i)=>{
    globalN++;
    const ok=!scWrong.includes(i);
    const ui=answers['sc'+i];
    const userTxt=ui===undefined?'未作答':`${LABS[ui]}. ${q.o[ui]}`;
    const corrTxt=`${LABS[q.a]}. ${q.o[q.a]}`;
    rb.appendChild(makeRV(globalN,q.q,ok,userTxt,ok?'':corrTxt));
  });
  quizMC.forEach((q,i)=>{
    globalN++;
    const ok=!mcWrong.includes(i);
    const given=(answers['mc'+i]||[]).sort((a,b)=>a-b);
    const userTxt=given.length?given.map(j=>`${LABS[j]}. ${q.o[j]}`).join('、'):'未作答';
    const corrTxt=[...q.a].sort((a,b)=>a-b).map(j=>`${LABS[j]}. ${q.o[j]}`).join('、');
    rb.appendChild(makeRV(globalN,q.q,ok,userTxt,ok?'':corrTxt));
  });

  document.getElementById('pg-quiz').classList.add('hidden');
  document.getElementById('pg-result').classList.remove('hidden');
  window.scrollTo(0,0);

  // 自動送出成績到 Google 表單
  sendToGoogleForm(userName, pct);
}

// ╔══════════════════════════════════════════╗
// ║         SEND TO GOOGLE FORM             ║
// ╚══════════════════════════════════════════╝
function sendToGoogleForm(name, score) {
  const FORM_URL = 'https://docs.google.com/forms/d/e/[填入你的表單ID]/formResponse';

  const formData = new FormData();
  formData.append('entry.728764218', name);      // 姓名欄位
  formData.append('entry.1974962633', score);    // 分數欄位

  alert('準備傳送資料...');

  fetch(FORM_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: formData
  }).then(function() {
    alert('已執行傳送動作');
  }).catch(function(err) {
    alert('已執行傳送動作');
    console.log('Google Form 回應：', err);
  });
}

function makeRV(n,q,ok,userTxt,corrTxt){
  const d=document.createElement('div');
  d.className='rv '+(ok?'rv-ok':'rv-no');
  d.innerHTML=`
    <div class="rv-q">第 ${n} 題：${q}</div>
    <div class="rv-ans">
      您的答案：<span class="rv-mine">${userTxt}</span>
      ${!ok?`　正確答案：<span class="rv-correct">${corrTxt}</span>`:''}
    </div>`;
  return d;
}
